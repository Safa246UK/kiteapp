{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-success">
            <div class="card-body p-5 text-center">
                <img src="/static/icon-192.png" width="64" height="64"
                     style="border-radius:12px;margin-bottom:1.5rem;" alt="WindChaser">
                <h3 class="mb-3 text-success">You're all set!</h3>
                <p class="text-muted">
                    Your payment details have been saved securely.
                    We'll take <strong>£3.00</strong> on the 25th of each month —

                </p>
                <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-3">
                    Back to WindChaser
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
